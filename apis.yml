aid: nextdoor
name: Nextdoor
description: >-
  Nextdoor for Developers offers APIs to advertise on, share to, and display
  content from Nextdoor, the neighborhood-based social network. The developer
  platform groups capabilities into Advertising APIs (campaign management and
  measurement), Sharing APIs (Share Plugin and Publish to Nextdoor), and
  Displaying Content APIs (Trending Posts, Search, and Public Agency Feed).
